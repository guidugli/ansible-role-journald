---
- name: Get the list of services
  ansible.builtin.service_facts:
  tags:
    - journald
    - validate

- name: Disable rsyslog socket
  ansible.builtin.systemd_service:
    name: rsyslog.socket
    state: stopped
    enabled: false
    masked: true
  when: "'rsyslog.socket' in ansible_facts['services']"
  tags:
    - journald
    - service

- name: Disable rsyslog service
  ansible.builtin.systemd_service:
    name: rsyslog.service
    state: stopped
    enabled: false
    masked: true
  when: "'rsyslog.service' in ansible_facts['services']"
  tags:
    - journald
    - service
